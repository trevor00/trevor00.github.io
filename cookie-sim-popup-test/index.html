<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controlled Cookie Simulation Popup Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 980px; line-height: 1.5; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input { width: 100%; padding: .55rem; box-sizing: border-box; font: inherit; }
    button { margin: .5rem .25rem .5rem 0; padding: .55rem .8rem; font: inherit; cursor: pointer; }
    pre { background: #f5f5f5; border: 1px solid #ddd; padding: 1rem; min-height: 14rem; overflow: auto; }
    .note { background: #fff8d8; border: 1px solid #e5d37a; padding: .75rem; }
  </style>
</head>
<body>
  <h1>Controlled Cookie Simulation Popup Test</h1>
  <p class="note">
    Controlled lab test. This page relays page metadata plus one lab-created cookie named
    LOCAL_BRIDGE_TEST_COOKIE. It does not read or relay arbitrary cookies, forms, passwords, or account data.
  </p>

  <label>Popup target URL</label>
  <input id="target" value="http://127.0.0.1:8891/helper.html?closeAfterMs=1">

  <label>Lab cookie name</label>
  <input id="cookieName" value="LOCAL_BRIDGE_TEST_COOKIE">

  <label>Interval in milliseconds</label>
  <input id="intervalMs" value="5000">

  <label>Maximum sends for this run</label>
  <input id="maxSends" value="6">

  <button id="setCookie">Create / refresh lab cookie</button>
  <button id="sendOnce">Send once</button>
  <button id="start">Start periodic relay</button>
  <button id="stop">Stop</button>
  <button id="clear">Clear log</button>

  <h2>Payload preview</h2>
  <pre id="payload"></pre>

  <h2>Log</h2>
  <pre id="log"></pre>

<script>
const $ = id => document.getElementById(id);
let timer = null;
let sentCount = 0;

function log(message) {
  const line = `[${new Date().toISOString()}] ${message}`;
  $('log').textContent += line + '\n';
  console.log(line);
}

function pageInfo() {
  return {
    origin: window.location.origin,
    protocol: window.location.protocol,
    host: window.location.host,
    hostname: window.location.hostname,
    pathname: window.location.pathname,
    title: document.title
  };
}

function getCookie(name) {
  const prefix = encodeURIComponent(name) + '=';
  for (const part of document.cookie.split(';')) {
    const trimmed = part.trim();
    if (trimmed.startsWith(prefix)) {
      return decodeURIComponent(trimmed.slice(prefix.length));
    }
  }
  return '';
}

function setLabCookie() {
  const name = $('cookieName').value || 'LOCAL_BRIDGE_TEST_COOKIE';
  const value = `LAB_COOKIE_CANARY_${crypto.randomUUID()}_${Date.now()}`;
  document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; Path=/; SameSite=Lax; Max-Age=3600`;
  log(`created lab cookie ${name}=${value}`);
  renderPreview();
  return value;
}

function ensureLabCookie() {
  const name = $('cookieName').value || 'LOCAL_BRIDGE_TEST_COOKIE';
  let value = getCookie(name);
  if (!value) value = setLabCookie();
  return { name, value };
}

function buildPayload() {
  const { name, value } = ensureLabCookie();
  return {
    kind: 'lab-cookie-simulation-with-page-info',
    cookieName: name,
    cookieValue: value,
    page: pageInfo(),
    sentAt: new Date().toISOString(),
    sequence: sentCount + 1
  };
}

function renderPreview() {
  const name = $('cookieName').value || 'LOCAL_BRIDGE_TEST_COOKIE';
  const value = getCookie(name) || '(not created yet)';
  $('payload').textContent = JSON.stringify({
    kind: 'lab-cookie-simulation-with-page-info',
    cookieName: name,
    cookieValue: value,
    page: pageInfo()
  }, null, 2);
}

function buildPopupUrl() {
  const url = new URL($('target').value);
  const payload = buildPayload();
  renderPreview();

  url.searchParams.set('token', JSON.stringify(payload));
  url.searchParams.set('returnOrigin', window.location.origin);
  url.searchParams.set('parentOrigin', window.location.origin);
  url.searchParams.set('source', 'cookie-sim-popup-test');
  return url.toString();
}

function sendOnce(label = 'send-once') {
  const url = buildPopupUrl();
  sentCount += 1;
  log(`${label}: opening helper popup #${sentCount}`);

  const win = window.open(url, 'cookie_sim_popup_test', 'popup,width=520,height=420');
  if (win) {
    log(`${label}: window.open returned Window object`);
  } else {
    log(`${label}: window.open returned null; popup was likely blocked`);
  }
}

function startPeriodic() {
  stopPeriodic();
  sentCount = 0;
  const intervalMs = Math.max(1000, Number($('intervalMs').value) || 5000);
  const maxSends = Math.max(1, Number($('maxSends').value) || 6);
  log(`periodic relay started: interval=${intervalMs}ms maxSends=${maxSends}`);

  sendOnce('periodic-initial');
  timer = setInterval(() => {
    if (sentCount >= maxSends) {
      stopPeriodic();
      log('periodic relay finished after max sends');
      return;
    }
    sendOnce('periodic');
  }, intervalMs);
}

function stopPeriodic() {
  if (timer) {
    clearInterval(timer);
    timer = null;
    log('periodic relay stopped');
  }
}

window.addEventListener('message', event => {
  log(`postMessage from ${event.origin}: ${JSON.stringify(event.data)}`);
});

$('setCookie').onclick = setLabCookie;
$('sendOnce').onclick = () => sendOnce('manual');
$('start').onclick = startPeriodic;
$('stop').onclick = stopPeriodic;
$('clear').onclick = () => { $('log').textContent = ''; };

setLabCookie();
renderPreview();
log('Loaded. Automatic periodic relay will start in 800 ms.');
setTimeout(startPeriodic, 800);
</script>
</body>
</html>
