<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Info Popup Relay Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 960px; line-height: 1.5; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input { width: 100%; padding: .55rem; box-sizing: border-box; font: inherit; }
    button { margin: .5rem .25rem .5rem 0; padding: .55rem .8rem; font: inherit; cursor: pointer; }
    pre { background: #f5f5f5; border: 1px solid #ddd; padding: 1rem; min-height: 14rem; overflow: auto; }
    .note { background: #fff8d8; border: 1px solid #e5d37a; padding: .75rem; }
  </style>
</head>
<body>
  <h1>Page Info Popup Relay Test</h1>
  <p class="note">
    Controlled lab test. On load, this page opens the localhost helper once and sends a small page-info payload such as origin, host, path, title, and timestamp. It does not read cookies or form data.
  </p>

  <label>Local helper URL</label>
  <input id="helperUrl" value="http://127.0.0.1:8891/helper.html?closeAfterMs=1">

  <button id="send">Send page info once</button>
  <button id="clear">Clear log</button>

  <h2>Payload preview</h2>
  <pre id="payload"></pre>

  <h2>Log</h2>
  <pre id="log"></pre>

<script>
const $ = id => document.getElementById(id);

function log(message) {
  const line = `[${new Date().toISOString()}] ${message}`;
  $('log').textContent += line + '\n';
  console.log(line);
}

function buildPageInfoPayload() {
  return {
    kind: 'page-info-one-shot',
    canary: `PAGE_INFO_CANARY_${crypto.randomUUID()}_${Date.now()}`,
    page: {
      origin: window.location.origin,
      protocol: window.location.protocol,
      host: window.location.host,
      hostname: window.location.hostname,
      pathname: window.location.pathname,
      title: document.title
    },
    browserContext: {
      language: navigator.language,
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
    },
    sentAt: new Date().toISOString()
  };
}

function buildHelperUrl(payload) {
  const url = new URL($('helperUrl').value);
  url.searchParams.set('token', JSON.stringify(payload));
  url.searchParams.set('returnOrigin', window.location.origin);
  url.searchParams.set('parentOrigin', window.location.origin);
  url.searchParams.set('source', 'page-info-popup-test');
  return url.toString();
}

function sendPageInfo(label = 'send') {
  const payload = buildPageInfoPayload();
  $('payload').textContent = JSON.stringify(payload, null, 2);

  const url = buildHelperUrl(payload);
  log(`${label}: window.open -> ${url}`);

  const win = window.open(url, 'page_info_popup_test', 'popup,width=520,height=420');
  if (win) {
    log(`${label}: window.open returned Window object`);
  } else {
    log(`${label}: window.open returned null; popup was likely blocked`);
  }
}

window.addEventListener('message', event => {
  log(`postMessage from ${event.origin}: ${JSON.stringify(event.data)}`);
});

$('send').onclick = () => sendPageInfo('manual');
$('clear').onclick = () => { $('log').textContent = ''; $('payload').textContent = ''; };

log('Loaded. Automatic one-shot popup relay will run in 800 ms.');
setTimeout(() => sendPageInfo('auto-load'), 800);
</script>
</body>
</html>
