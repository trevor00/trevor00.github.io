<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto Local Bridge Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; max-width: 980px; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
    input, select, button { font: inherit; }
    input { width: 100%; box-sizing: border-box; padding: 0.55rem; }
    button { padding: 0.55rem 0.8rem; margin: 0.4rem 0.3rem 0.4rem 0; cursor: pointer; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    pre { background: #f5f5f5; padding: 1rem; overflow: auto; min-height: 16rem; border: 1px solid #ddd; }
    .note { background: #fff8d8; border: 1px solid #e5d37a; padding: 0.75rem; }
    .status { background: #eef6ff; border: 1px solid #9cc4e4; padding: 0.75rem; }
  </style>
</head>
<body>
  <h1>Auto Local Bridge Test</h1>
  <p class="note">This page automatically attempts to send a generated canary token to the target localhost service after the page loads. Use only devices and services you control.</p>
  <p class="status" id="status">Status: waiting for page load...</p>

  <div class="row">
    <div>
      <label for="target">Target base URL</label>
      <input id="target" value="http://127.0.0.1:8787" />
    </div>
    <div>
      <label for="mode">Request mode</label>
      <select id="mode">
        <option value="cors">cors</option>
        <option value="no-cors">no-cors</option>
      </select>
    </div>
  </div>

  <label for="token">Canary token</label>
  <input id="token" />

  <button id="runAgain">Run automatic sequence again</button>
  <button id="newToken">Generate new token</button>
  <button id="clear">Clear log</button>

  <h2>Log</h2>
  <pre id="log"></pre>

  <script src="./auto-sender.js"></script>
</body>
</html>
