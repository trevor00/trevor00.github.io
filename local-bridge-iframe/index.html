<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iframe Local Bridge Coverage Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; max-width: 980px; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
    input, button { font: inherit; }
    input { width: 100%; box-sizing: border-box; padding: 0.55rem; }
    button { padding: 0.55rem 0.8rem; margin: 0.4rem 0.3rem 0.4rem 0; cursor: pointer; }
    pre { background: #f5f5f5; padding: 1rem; overflow: auto; min-height: 14rem; border: 1px solid #ddd; }
    iframe { width: 100%; height: 300px; border: 1px solid #999; background: #fff; }
    .note { background: #fff8d8; border: 1px solid #e5d37a; padding: 0.75rem; }
  </style>
</head>
<body>
  <h1>Iframe Local Bridge Coverage Test</h1>
  <p class="note">Controlled test: this page tries to embed a local HTTP page in a visible iframe. Use only local services you control. Check whether the iframe loads, whether the local receiver gets the canary token, and whether postMessage returns to this HTTPS page.</p>

  <label for="localPage">Local iframe page</label>
  <input id="localPage" value="http://127.0.0.1:8000/web/local-bounce.html" />

  <label for="target">Target localhost receiver</label>
  <input id="target" value="http://127.0.0.1:8787" />

  <label for="token">Canary token</label>
  <input id="token" />

  <button id="newToken">Generate new token</button>
  <button id="loadFrame">Load local page in iframe</button>
  <button id="clear">Clear log</button>

  <h2>Iframe</h2>
  <iframe id="frame" title="local iframe test"></iframe>

  <h2>Log</h2>
  <pre id="log"></pre>

<script>
const $ = (id) => document.getElementById(id);

function log(message) {
  const line = `[${new Date().toISOString()}] ${message}`;
  $('log').textContent += line + '\n';
  console.log(line);
}

function newToken() {
  const token = `IFRAME_CANARY_${crypto.randomUUID()}_${Date.now()}`;
  $('token').value = token;
  return token;
}

function buildLocalUrl() {
  const token = $('token').value || newToken();
  const url = new URL($('localPage').value);
  url.searchParams.set('target', $('target').value);
  url.searchParams.set('token', token);
  url.searchParams.set('returnOrigin', window.location.origin);
  url.searchParams.set('returnMode', 'parent');
  return url;
}

function loadFrame() {
  const url = buildLocalUrl();
  log(`Loading iframe: ${url.toString()}`);
  $('frame').src = url.toString();
}

$('frame').addEventListener('load', () => {
  log('iframe load event fired. Check the local receiver logs for token delivery.');
});

window.addEventListener('message', (event) => {
  log(`postMessage from ${event.origin}: ${JSON.stringify(event.data)}`);
});

$('newToken').onclick = () => log(`new token: ${newToken()}`);
$('loadFrame').onclick = loadFrame;
$('clear').onclick = () => { $('log').textContent = ''; };

newToken();
log('Ready. Start local HTTP server on 8000 and receiver on 8787, then click Load local page in iframe.');
</script>
</body>
</html>
