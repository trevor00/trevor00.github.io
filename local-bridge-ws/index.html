<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSocket Local Coverage Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; max-width: 980px; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
    input, button { font: inherit; }
    input { width: 100%; box-sizing: border-box; padding: 0.55rem; }
    button { padding: 0.55rem 0.8rem; margin: 0.4rem 0.3rem 0.4rem 0; cursor: pointer; }
    pre { background: #f5f5f5; padding: 1rem; overflow: auto; min-height: 16rem; border: 1px solid #ddd; }
    .note { background: #fff8d8; border: 1px solid #e5d37a; padding: 0.75rem; }
  </style>
</head>
<body>
  <h1>WebSocket Local Coverage Test</h1>
  <p class="note">This page checks whether a public HTTPS origin can initiate a WebSocket connection to a localhost service. Use only services and devices you control.</p>

  <label for="target">WebSocket URL</label>
  <input id="target" value="ws://127.0.0.1:8791/ws" />

  <label for="token">Canary token</label>
  <input id="token" />

  <button id="newToken">Generate new token</button>
  <button id="connect">Try WebSocket connect</button>
  <button id="auto">Run automatic attempt</button>
  <button id="clear">Clear log</button>

  <h2>Log</h2>
  <pre id="log"></pre>

  <script src="./ws-sender.js"></script>
</body>
</html>
